<!DOCTYPE html>
<html lang="en">

    <meta name="color-scheme" content="light">
    <meta name="robots" content="noindex">
    <title>Page not found — Device</title>
    <link rel="icon" href="/htmlacademy-htmlcss-device/img/favicon.svg" type="image/svg+xml">
    <style>
      :root {
        --accent: #ffe17f;
        --accent-active: #ffc700;
        --dark: #1d1d1d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--dark);
        background: radial-gradient(circle at 50% 0%, #fff8e3, #ffffff 60%);
        text-align: center;
      }

      .nf {
        max-width: 520px;
      }

      .nf-logo {
        height: 34px;
        width: auto;
        margin-bottom: 40px;
      }

      .nf-code {
        margin: 0;
        font-size: 140px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: 4px;
        color: var(--accent);
        text-shadow: 0 6px 0 rgba(0, 0, 0, 0.06);
      }

      .nf-title {
        margin: 8px 0 12px;
        font-size: 30px;
        font-weight: 800;
      }

      .nf-text {
        margin: 0 0 32px;
        font-size: 17px;
        line-height: 1.5;
        color: #555;
      }

      .nf-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        justify-content: center;
      }

      .nf-btn {
        display: inline-block;
        padding: 13px 28px;
        border: 2px solid var(--dark);
        border-radius: 4px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        text-decoration: none;
        color: var(--dark);
        background: transparent;
        transition: background-color 0.2s ease, color 0.2s ease;
      }

      .nf-btn:hover,
      .nf-btn:focus-visible {
        background: var(--dark);
        color: #fff;
      }

      .nf-btn-primary {
        border-color: var(--accent-active);
        background: var(--accent);
      }

      .nf-btn-primary:hover,
      .nf-btn-primary:focus-visible {
        background: var(--accent-active);
        color: var(--dark);
      }
    </style>
  </head>
